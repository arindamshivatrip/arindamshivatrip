<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ari Tripathi GitHub profile banner</title>
  <desc id="desc">A restrained editorial banner reading Ari Tripathi, Builder Researcher Technologist, Human-centered AI, Interaction Design, Spatial Computing.</desc>

  <rect width="1600" height="520" fill="#F5F2EE"/>

  <circle cx="1310" cy="120" r="180" fill="#DED6CF" opacity="0.55"/>
  <circle cx="1460" cy="430" r="240" fill="#E8E0D8" opacity="0.7"/>
  <path d="M0 430 C250 380 410 470 650 420 C900 368 1040 276 1600 324" stroke="#DED6CF" stroke-width="2" opacity="0.9"/>
  <path d="M0 468 C280 420 450 500 720 455 C950 417 1180 360 1600 388" stroke="#D7CEC7" stroke-width="1.5" opacity="0.7"/>

  <g transform="translate(120 108)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="1.5" fill="#6B5F55">
      BUILDER · RESEARCHER · TECHNOLOGIST
    </text>

    <text x="0" y="104" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="650" letter-spacing="-3" fill="#3D312A">
      Ari Tripathi
    </text>

    <text x="0" y="180" font-family="Inter, Arial, sans-serif" font-size="38" letter-spacing="-0.7" fill="#3D312A">
      I design and build systems for people.
    </text>

    <g transform="translate(0 242)">
      <rect x="0" y="0" width="250" height="52" rx="26" fill="#FFFFFF" stroke="#DED6CF"/>
      <text x="28" y="34" font-family="Inter, Arial, sans-serif" font-size="21" fill="#3D312A">Human-centered AI</text>

      <rect x="274" y="0" width="252" height="52" rx="26" fill="#FFFFFF" stroke="#DED6CF"/>
      <text x="302" y="34" font-family="Inter, Arial, sans-serif" font-size="21" fill="#3D312A">Interaction Design</text>

      <rect x="550" y="0" width="260" height="52" rx="26" fill="#FFFFFF" stroke="#DED6CF"/>
      <text x="578" y="34" font-family="Inter, Arial, sans-serif" font-size="21" fill="#3D312A">Spatial Computing</text>
    </g>
  </g>

  <g transform="translate(1210 300)" opacity="0.95">
    <rect x="0" y="0" width="220" height="120" rx="22" fill="#FFFFFF" stroke="#DED6CF"/>
    <text x="28" y="44" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5F55">AI systems</text>
    <text x="28" y="76" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5F55">UX engineering</text>
    <text x="28" y="108" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5F55">XR prototypes</text>
