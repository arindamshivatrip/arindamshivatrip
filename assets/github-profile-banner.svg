<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Arindam Tripathi GitHub profile banner</title>
  <desc id="desc">A restrained editorial banner reading Arindam Tripathi, Builder Researcher Technologist, Human-centered AI, Interaction Design, Spatial Computing.</desc>

  <rect width="1600" height="420" fill="#F5F2EE"/>

  <circle cx="1320" cy="80" r="180" fill="#DED6CF" opacity="0.52"/>
  <circle cx="1490" cy="365" r="230" fill="#E8E0D8" opacity="0.72"/>

  <path d="M0 330 C250 292 440 356 690 315 C945 273 1120 230 1600 268" stroke="#DED6CF" stroke-width="2" opacity="0.9"/>
  <path d="M0 366 C290 326 500 386 760 350 C1000 316 1210 296 1600 325" stroke="#D7CEC7" stroke-width="1.5" opacity="0.75"/>

  <g transform="translate(120 92)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="1.6" fill="#6B5F55">
      BUILDER · RESEARCHER · TECHNOLOGIST
    </text>

    <text x="0" y="102" font-family="Inter, Arial, sans-serif" font-size="92" font-weight="650" letter-spacing="-3.2" fill="#3D312A">
