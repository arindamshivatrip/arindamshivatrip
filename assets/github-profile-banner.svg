    </text>

    <text x="0" y="170" font-family="Inter, Arial, sans-serif" font-size="36" letter-spacing="-0.6" fill="#3D312A">
      I design and build systems for people.
    </text>

    <g transform="translate(0 228)">
      <rect x="0" y="0" width="255" height="54" rx="27" fill="#FFFFFF" stroke="#DED6CF"/>
      <text x="30" y="36" font-family="Inter, Arial, sans-serif" font-size="22" fill="#3D312A">Human-centered AI</text>

      <rect x="280" y="0" width="256" height="54" rx="27" fill="#FFFFFF" stroke="#DED6CF"/>
      <text x="310" y="36" font-family="Inter, Arial, sans-serif" font-size="22" fill="#3D312A">Interaction Design</text>

      <rect x="560" y="0" width="265" height="54" rx="27" fill="#FFFFFF" stroke="#DED6CF"/>
      <text x="590" y="36" font-family="Inter, Arial, sans-serif" font-size="22" fill="#3D312A">Spatial Computing</text>
    </g>
